<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KingBurger · Media Upload</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --surface2: #222222;
      --border: #2e2e2e;
      --accent: #f5a623;
      --accent2: #e8441a;
      --text: #f0ede8;
      --muted: #888;
      --success: #3ecf8e;
      --error: #e8441a;
      --radius: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.4em;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 0.9em;
    }

    /* ── Layout ── */
    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    /* ── Drop Zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(245, 166, 35, 0.05);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-icon {
      font-size: 2.5em;
      margin-bottom: 12px;
    }

    .drop-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1em;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .drop-sub {
      color: var(--muted);
      font-size: 0.85em;
    }

    /* ── Buttons ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 20px;
    }

    @media (max-width: 500px) {
      .btn-row {
        grid-template-columns: 1fr;
      }
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
    }

    /* ── File List ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1em;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--accent);
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75em;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .file-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }

    .file-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .file-orig {
      font-size: 0.85em;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-sz {
      font-size: 0.78em;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--muted);
      white-space: nowrap;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .name-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 0.85em;
      transition: border-color 0.2s;
    }

    .name-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .name-input.invalid {
      border-color: var(--error);
    }

    .ext-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: monospace;
      font-size: 0.85em;
      color: var(--muted);
    }

    .file-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 0.8em;
      border-radius: 6px;
    }

    .btn-danger {
      background: rgba(232, 68, 26, 0.15);
      color: var(--error);
      border: 1px solid rgba(232, 68, 26, 0.3);
    }

    .btn-danger:hover {
      background: rgba(232, 68, 26, 0.25);
    }

    .btn-reset {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-reset:hover {
      color: var(--text);
    }

    .validation-msg {
      font-size: 0.78em;
      color: var(--error);
      margin-top: 4px;
      display: none;
    }

    /* ── Progress ── */
    .progress-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.88em;
    }

    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .progress-fill.done {
      background: var(--success);
    }

    .progress-fill.fail {
      background: var(--error);
    }

    .p-badge {
      font-size: 0.75em;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .p-badge.pending {
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
    }

    .p-badge.uploading {
      background: rgba(245, 166, 35, 0.15);
      color: var(--accent);
    }

    .p-badge.success {
      background: rgba(62, 207, 142, 0.15);
      color: var(--success);
    }

    .p-badge.error {
      background: rgba(232, 68, 26, 0.15);
      color: var(--error);
    }

    /* ── Status Banner ── */
    .status-banner {
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.9em;
      font-weight: 500;
      margin-top: 16px;
      display: none;
    }

    .status-banner.error {
      background: rgba(232, 68, 26, 0.12);
      color: var(--error);
      border: 1px solid rgba(232, 68, 26, 0.3);
    }

    .status-banner.success {
      background: rgba(62, 207, 142, 0.12);
      color: var(--success);
      border: 1px solid rgba(62, 207, 142, 0.3);
    }

    .status-banner.show {
      display: block;
    }

    /* ── Results ── */
    .results-card {
      display: none;
    }

    .results-card.show {
      display: block;
    }

    .result-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .result-item.failed {
      border-color: rgba(232, 68, 26, 0.3);
    }

    .result-name {
      font-size: 0.85em;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .result-url {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 0.78em;
      word-break: break-all;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .btn-copy {
      background: rgba(62, 207, 142, 0.12);
      color: var(--success);
      border: 1px solid rgba(62, 207, 142, 0.3);
      width: 100%;
      padding: 8px;
      font-size: 0.85em;
      border-radius: 6px;
    }

    .btn-copy:hover {
      background: rgba(62, 207, 142, 0.22);
    }

    .btn-copy.copied {
      opacity: 0.6;
    }

    .error-msg {
      color: var(--error);
      font-size: 0.85em;
    }

    /* ── Hidden ── */
    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">🍔</div>
        <span class="logo-text">KingBurger Media</span>
      </div>
      <p>Upload product images · JPG, PNG, GIF, WEBP · Max 5 MB each</p>
    </header>

    <!-- Upload Card -->
    <div class="card">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp" multiple>
        <div class="drop-icon">📁</div>
        <div class="drop-title">Click to browse or drag images here</div>
        <div class="drop-sub">Multiple files supported · Max 5 MB each</div>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="uploadBtn" disabled>Upload Images</button>
        <button class="btn-ghost" onclick="clearAll()">Clear All</button>
      </div>

      <div class="status-banner" id="statusBanner"></div>
    </div>

    <!-- File List -->
    <div class="card hidden" id="fileListCard">
      <div class="section-title">
        Selected Images
        <span class="badge" id="fileCount">0</span>
      </div>
      <div id="fileList"></div>
    </div>

    <!-- Progress -->
    <div class="card hidden" id="progressCard">
      <div class="section-title">Uploading…</div>
      <div id="progressList"></div>
    </div>

    <!-- Results -->
    <div class="card results-card" id="resultsCard">
      <div class="section-title">✅ Upload Complete</div>
      <p style="color:var(--muted); font-size:0.88em; margin-bottom:20px;">Copy the URLs below to use in your product
        listings.</p>
      <div id="resultsList"></div>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────────
    const MEDIA_SERVER = "https://media.kingburger.site";
    // Credentials are sent via Basic Auth on each upload request.
    // The browser will prompt for these on first load (via the server's 401 challenge),
    // or you can hardcode them here if this page is only ever accessed locally/internally.
    // For a truly internal tool, you can set:
    // const AUTH_HEADER = "Basic " + btoa("username:password");
    // Otherwise leave as null and the browser will prompt.
    const AUTH_HEADER = null;

    const ALLOWED_TYPES = ["image/jpeg", "image/png", "image/gif", "image/webp"];
    const MAX_SIZE = 5 * 1024 * 1024;

    // ── State ───────────────────────────────────────────────────────────────────
    let selectedFiles = [];   // { file, customBase }
    let uploadedUrls = [];

    // ── DOM Refs ─────────────────────────────────────────────────────────────────
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileListCard = document.getElementById("fileListCard");
    const fileList = document.getElementById("fileList");
    const fileCountEl = document.getElementById("fileCount");
    const progressCard = document.getElementById("progressCard");
    const progressList = document.getElementById("progressList");
    const resultsCard = document.getElementById("resultsCard");
    const resultsList = document.getElementById("resultsList");
    const statusBanner = document.getElementById("statusBanner");

    // ── Drop Zone ────────────────────────────────────────────────────────────────
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      addFiles(Array.from(e.dataTransfer.files));
    });
    fileInput.addEventListener("change", () => {
      addFiles(Array.from(fileInput.files));
      fileInput.value = ""; // reset so same file can be re-added after removal
    });

    // ── File Validation & Adding ─────────────────────────────────────────────────
    function addFiles(incoming) {
      const errors = [];
      const valid = [];

      for (const f of incoming) {
        if (!ALLOWED_TYPES.includes(f.type)) {
          errors.push(`"${f.name}" — unsupported type (${f.type || "unknown"})`);
          continue;
        }
        if (f.size > MAX_SIZE) {
          errors.push(`"${f.name}" — exceeds 5 MB limit`);
          continue;
        }
        // Deduplicate by name+size
        const isDupe = selectedFiles.some(s => s.file.name === f.name && s.file.size === f.size);
        if (!isDupe) {
          valid.push({ file: f, customBase: stripExt(f.name) });
        }
      }

      if (errors.length) {
        showBanner("⚠️ Skipped: " + errors.join("; "), "error");
      } else {
        hideBanner();
      }

      selectedFiles = [...selectedFiles, ...valid];
      renderFileList();
      uploadBtn.disabled = selectedFiles.length === 0;
    }

    function stripExt(name) { return name.replace(/\.[^.]+$/, ""); }
    function getExt(name) { return (name.match(/\.[^.]+$/) || [""])[0].toLowerCase(); }

    // ── Filename Sanitisation (client-side mirror of server) ─────────────────────
    function sanitise(name) {
      return name
        .replace(/[/\\?%*:|"<>]/g, "-")
        .replace(/\.\./g, "-")
        .replace(/^\.+/, "")
        .trim()
        .slice(0, 100);
    }

    // ── Render File List ─────────────────────────────────────────────────────────
    function renderFileList() {
      if (selectedFiles.length === 0) {
        fileListCard.classList.add("hidden");
        return;
      }
      fileListCard.classList.remove("hidden");
      fileCountEl.textContent = selectedFiles.length;

      fileList.innerHTML = selectedFiles.map((entry, idx) => {
        const ext = getExt(entry.file.name);
        const sizeMB = (entry.file.size / 1024 / 1024).toFixed(2);
        return `
        <div class="file-item" id="fi-${idx}">
          <div class="file-header">
            <span class="file-orig">📄 ${escHtml(entry.file.name)}</span>
            <span class="file-sz">${sizeMB} MB</span>
          </div>
          <div class="name-row">
            <input
              class="name-input"
              id="ni-${idx}"
              type="text"
              value="${escHtml(entry.customBase)}"
              placeholder="custom filename (no extension)"
              oninput="updateName(${idx}, this)"
            >
            <span class="ext-tag">${escHtml(ext)}</span>
          </div>
          <div class="validation-msg" id="vm-${idx}"></div>
          <div class="file-actions">
            <button class="btn-sm btn-reset" onclick="resetName(${idx})">Reset</button>
            <button class="btn-sm btn-danger" onclick="removeFile(${idx})">Remove</button>
          </div>
        </div>`;
      }).join("");
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function updateName(idx, input) {
      const raw = input.value.trim();
      const clean = sanitise(raw);
      selectedFiles[idx].customBase = clean || stripExt(selectedFiles[idx].file.name);

      const vm = document.getElementById(`vm-${idx}`);
      if (raw !== clean && raw.length > 0) {
        input.classList.add("invalid");
        vm.textContent = `Invalid characters will be replaced. Saved as: "${clean}"`;
        vm.style.display = "block";
      } else {
        input.classList.remove("invalid");
        vm.style.display = "none";
      }
    }

    function resetName(idx) {
      selectedFiles[idx].customBase = stripExt(selectedFiles[idx].file.name);
      renderFileList();
    }

    function removeFile(idx) {
      selectedFiles.splice(idx, 1);
      renderFileList();
      uploadBtn.disabled = selectedFiles.length === 0;
    }

    // ── Upload ───────────────────────────────────────────────────────────────────
    uploadBtn.addEventListener("click", startUpload);

    async function startUpload() {
      if (selectedFiles.length === 0) return;
      hideBanner();
      uploadBtn.disabled = true;
      uploadedUrls = [];

      // Show progress
      progressCard.classList.remove("hidden");
      progressList.innerHTML = selectedFiles.map((entry, idx) => {
        const name = entry.customBase + getExt(entry.file.name);
        return `
        <div class="progress-item" id="pi-${idx}">
          <div class="progress-header">
            <span>${escHtml(name)}</span>
            <span class="p-badge pending" id="pb-${idx}">Pending</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="pf-${idx}"></div></div>
        </div>`;
      }).join("");

      // Upload sequentially (avoid hitting rate limit)
      for (let i = 0; i < selectedFiles.length; i++) {
        await uploadOne(selectedFiles[i], i);
      }

      showResults();
      uploadBtn.disabled = false;
    }

    async function uploadOne(entry, idx) {
      const badge = document.getElementById(`pb-${idx}`);
      const fill = document.getElementById(`pf-${idx}`);
      const ext = getExt(entry.file.name);
      const filename = (entry.customBase || stripExt(entry.file.name)) + ext;

      badge.textContent = "Uploading…";
      badge.className = "p-badge uploading";

      try {
        const fd = new FormData();
        fd.append("file", entry.file, filename);

        const headers = {};
        if (AUTH_HEADER) headers["Authorization"] = AUTH_HEADER;

        const res = await fetch(`${MEDIA_SERVER}/upload`, {
          method: "POST",
          headers,
          body: fd,
          credentials: "include"   // sends cookies / browser-cached Basic Auth
        });

        let data;
        try {
          const text = await res.text();
          try { data = JSON.parse(text); } catch { data = { error: text || `HTTP ${res.status}` }; }
        } catch (e) {
          data = { error: e.message };
        }

        if (res.ok && data.url) {
          uploadedUrls.push({ name: filename, url: data.url });
          badge.textContent = "✅ Done";
          badge.className = "p-badge success";
          fill.style.width = "100%";
          fill.classList.add("done");
        } else {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
      } catch (err) {
        const msg = err.message.includes("Failed to fetch")
          ? "Could not reach the upload server. Check your network."
          : err.message;
        uploadedUrls.push({ name: filename, url: null, error: msg });
        badge.textContent = "❌ Failed";
        badge.className = "p-badge error";
        fill.style.width = "100%";
        fill.classList.add("fail");
      }
    }

    // ── Results ──────────────────────────────────────────────────────────────────
    function showResults() {
      resultsList.innerHTML = uploadedUrls.map((item, i) => {
        if (item.error) {
          return `
          <div class="result-item failed">
            <div class="result-name">❌ ${escHtml(item.name)}</div>
            <div class="error-msg">${escHtml(item.error)}</div>
          </div>`;
        }
        return `
        <div class="result-item">
          <div class="result-name">✅ ${escHtml(item.name)}</div>
          <div class="result-url">${escHtml(item.url)}</div>
          <button class="btn-copy" id="copy-${i}" onclick="copyUrl('${escHtml(item.url)}', ${i})">Copy URL</button>
        </div>`;
      }).join("");

      resultsCard.classList.add("show");
      resultsCard.scrollIntoView({ behavior: "smooth" });
    }

    function copyUrl(url, idx) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById(`copy-${idx}`);
        btn.textContent = "✅ Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy URL";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    // ── Helpers ──────────────────────────────────────────────────────────────────
    function clearAll() {
      selectedFiles = [];
      uploadedUrls = [];
      fileListCard.classList.add("hidden");
      progressCard.classList.add("hidden");
      resultsCard.classList.remove("show");
      hideBanner();
      uploadBtn.disabled = true;
      fileList.innerHTML = "";
      fileInput.value = "";
    }

    function showBanner(msg, type) {
      statusBanner.textContent = msg;
      statusBanner.className = `status-banner ${type} show`;
    }
    function hideBanner() {
      statusBanner.className = "status-banner";
    }
  </script>
</body>

</html>
